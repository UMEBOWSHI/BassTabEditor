// ── Playhead anim ─────────────────────────────────────────────────
let phLine=null,phSvgEl=null,phScrollEl=null,phLastScrollLine=-1,schedAnchored=false,animLastStep=-1;
function animPH(){
  if(!playing){cancelAnimationFrame(afId);return;}
  const el=(performance.now()-pst)/1000,sd=(60/ptempo)*(1/12),pos=(psp+el/sd); // sd = one 48-division step in sec
  const ts=tSteps();const safePos=((pos%ts)+ts)%ts;
  const curStep=Math.floor(safePos);
  // Visual highlight + scrub bar update only when the integer step changes
  // (not every frame). This replaces the old per-step setTimeout chain.
  if(curStep!==animLastStep){
    ppos=curStep; // keep ppos in sync for updatePbar/hlStep/updGP
    hlStep(curStep);
    updatePbar();
    animLastStep=curStep;
  }
  const CW=getCW(),SX=CW/TPS,stepsPerLine=svgBPL*SPB,NS=gStr().length;
  const li=Math.floor(safePos/stepsPerLine),ci=safePos%stepsPerLine,cx=SVG_LP+ci*SX,LH=NS*SVG_SG+44,ly=SVG_TP+li*LH;
  if(!phSvgEl)phSvgEl=document.getElementById('tabSvg');
  const svg=phSvgEl;
  if(svg){
    if(!phLine||phLine.parentNode!==svg){
      phLine=svg.querySelector('.svgph');
      if(!phLine){phLine=document.createElementNS('http://www.w3.org/2000/svg','line');phLine.classList.add('svgph');phLine.setAttribute('stroke','#2a7fd4');phLine.setAttribute('stroke-width','1.5');svg.appendChild(phLine);}
    }
    phLine.setAttribute('x1',cx);phLine.setAttribute('x2',cx);phLine.setAttribute('y1',ly+SVG_SG-12);phLine.setAttribute('y2',ly+NS*SVG_SG+SVG_SG+8);phLine.setAttribute('opacity','1');
    if(autoSc){
      if(!phScrollEl)phScrollEl=document.getElementById('tabViewScroll');
      const w=phScrollEl;
      if(w&&li!==phLastScrollLine){const tY=li*LH;if(Math.abs(w.scrollTop-tY)>LH*.5){w.scrollTo({top:tY,behavior:'smooth'});phLastScrollLine=li;}}
    }
  }
  afId=requestAnimationFrame(animPH);
}
function hidePH(){cancelAnimationFrame(afId);const s=document.getElementById('tabSvg');if(s){const l=s.querySelector('.svgph');if(l)l.setAttribute('opacity','0');}}
function updGP(step){for(let b=0;b<bars;b++){const ph=document.getElementById('ph-b-'+b);if(!ph)continue;const bs=b*SPB;if(step>=0&&step>=bs&&step<bs+SPB){ph.style.left=(stepX(step-bs)+SW/(2*TPS)-1)+'px';ph.classList.add('visible');}else ph.classList.remove('visible');}}
// Statically position the SVG preview playhead line at a given step (used when not actively playing,
// e.g. after skip/rewind/scrub while paused). Does not animate — animPH() handles smooth motion during playback.
function updateSvgPH(step){
  const svg=document.getElementById('tabSvg');if(!svg)return;
  if(step<0){const l=svg.querySelector('.svgph');if(l)l.setAttribute('opacity','0');return;}
  const CW=getCW(),SX=CW/TPS,stepsPerLine=svgBPL*SPB,NS=gStr().length;
  const ts=tSteps();const safePos=((step%ts)+ts)%ts;
  const li=Math.floor(safePos/stepsPerLine),ci=safePos%stepsPerLine,cx=SVG_LP+ci*SX,LH=NS*SVG_SG+44,ly=SVG_TP+li*LH;
  let ln=svg.querySelector('.svgph');
  if(!ln){ln=document.createElementNS('http://www.w3.org/2000/svg','line');ln.classList.add('svgph');ln.setAttribute('stroke','#2a7fd4');ln.setAttribute('stroke-width','1.5');svg.appendChild(ln);}
  ln.setAttribute('x1',cx);ln.setAttribute('x2',cx);ln.setAttribute('y1',ly+SVG_SG-12);ln.setAttribute('y2',ly+NS*SVG_SG+SVG_SG+8);ln.setAttribute('opacity','1');
  if(autoSc){const w=document.getElementById('tabViewScroll');if(w){const tY=li*LH;if(Math.abs(w.scrollTop-tY)>LH*.8)w.scrollTo({top:tY,behavior:'smooth'});}}
}


// ── Canvas ─────────────────────────────────────────────────────────
function buildCanvas(){
  lastHlStep=-1; // DOM is rebuilt below; stale highlight refs no longer apply
  const cv=document.getElementById('tabCanvas');cv.innerHTML='';
  const strs=gStr();const NS=strs.length;const slotsPerBeat=VIS/tSig; // visible slots per beat
  const grid=document.createElement('div');grid.className='tab-grid-wrap';
  const sl=document.createElement('div');sl.className='string-labels';
  strs.forEach((s,si)=>{const l=document.createElement('div');l.className='string-lbl'+(si===NS-1?' low':'');l.textContent=s.n;sl.appendChild(l);});
  grid.appendChild(sl);const ba=document.createElement('div');ba.className='bars-area';
  for(let b=0;b<bars;b++){
    const bb=document.createElement('div');bb.className='bar-block';
    const bh=document.createElement('div');bh.className='bar-header';
    const bLbl=document.createElement('span');bLbl.textContent='小節 '+(b+1);bLbl.className='bar-jump';bLbl.title='タブ譜プレビューでこの小節を表示';bLbl.addEventListener('click',e=>{e.stopPropagation();scrollPreviewToBar(b);});bh.appendChild(bLbl);
    const bcB=document.createElement('span');bcB.className='bar-act';bcB.textContent='📋';bcB.title='小節をコピー';
    bcB.addEventListener('click',e=>{e.stopPropagation();copyBar(b);});bh.appendChild(bcB);
    const bpB=document.createElement('span');bpB.className='bar-act'+(barClip?'':' dis');bpB.textContent='📌';bpB.title='小節にペースト';
    bpB.addEventListener('click',e=>{e.stopPropagation();if(barClip)pasteBar(b);});bh.appendChild(bpB);
    if(bars>1){const x=document.createElement('span');x.className='bar-del';x.textContent='×';x.addEventListener('click',e=>{e.stopPropagation();delBar(b);});bh.appendChild(x);}
    bb.appendChild(bh);const sr=document.createElement('div');sr.className='steps-row';
    const ph=document.createElement('div');ph.className='playhead';ph.id='ph-b-'+b;ph.style.cssText='top:0;height:100%';sr.appendChild(ph);
    // Draw VIS visible slot-columns (each spans TPS internal steps). Clicking
    // a slot inserts at the slot's downbeat internal step (v*TPS).
    for(let v=0;v<VIS;v++){
      const step=b*SPB+v*TPS;const col=document.createElement('div');col.className='step-col'+(v%slotsPerBeat===0&&v>0?' beat':'');col.id='sc-'+step;
      if(playing&&ppos>=step&&ppos<step+TPS)col.classList.add('playing');
      strs.forEach((_,si)=>{const lane=document.createElement('div');lane.className='string-lane';const line=document.createElement('div');line.className='string-line';lane.appendChild(line);lane.addEventListener('click',e=>{e.stopPropagation();if(nOwner(si,step)!==null)return;openPop(si,step,e.clientX,e.clientY);});col.appendChild(lane);});
      sr.appendChild(col);
    }
    strs.forEach((_,si)=>{
      for(let s=0;s<SPB;s++){
        const step=b*SPB+s;const note=notes[nk(si,step)];if(!note)continue;
        const ds=dispS(note);const W=Math.max(20,(ds/TPS)*SW-4);const solidW=note.stac?Math.max(12,W/2):W;
        const blk=document.createElement('div');blk.className='note-block'+(note.ghost?' ghost':'')+(isTripDur(note.d)?' trip':'')+(playing&&ppos===step?' playing':'');
        blk.id='nb-'+si+'-'+step;blk.style.cssText=`left:${stepX(s)+2}px;top:${si*44+8}px;width:${W}px`;
        if(note.dot&&!note.ghost){const bp=(note.d/TPS)*SW-4;const df=document.createElement('div');df.className='dot-fade';df.style.width=Math.max(4,W-Math.max(20,bp))+'px';blk.appendChild(df);}
        if(note.stac){const sg=document.createElement('div');sg.className='stac-ghost';sg.style.width=(W-solidW)+'px';blk.appendChild(sg);}
        if(note.vib){const vl=document.createElement('div');vl.className='vib-lbl';vl.textContent='~';blk.appendChild(vl);}
        if(note.slide&&W>16){
          const durs=note.slide.durations;const totalD=durs.reduce((a,b)=>a+b,0)||1;
          let acc=0;
          durs.forEach((val,idx)=>{
            const segW=(val/totalD)*solidW;
            const seg=document.createElement('div');seg.className='slide-seg '+(slIsSlideIdx(idx)?'slide':'hold');
            seg.style.cssText=`left:${acc}px;width:${segW}px`;
            blk.appendChild(seg);acc+=segW;
          });
        }
        const inn=document.createElement('div');inn.className='note-inner';inn.style.cssText=`left:0;width:${solidW}px`;
        if(note.ghost){const fx=document.createElement('div');fx.className='note-fret';fx.textContent='×';inn.appendChild(fx);}
        else{
          const ff=document.createElement('div');ff.className='note-fret';
          let durSuffix='';
          if(note.dot) durSuffix='.';
          else if(!isTripDur(note.d)&&!STD_DURS.includes(note.d)) durSuffix=`(${note.d})`;
          let fretTxt=String(note.fret);
          if(note.slide){
            fretTxt+=note.slide.targets.map(t=>(t>note.fret?'↗':'↘')+t).join('');
          }
          ff.textContent=fretTxt+(durSuffix?` ${durSuffix}`:'');
          ff.style.fontSize=ff.textContent.length>5?'8px':ff.textContent.length>4?'9px':'12px';
          inn.appendChild(ff);
        }
        blk.appendChild(inn);
        const narrowCls=(note.d<=2)?' narrow':'';
        // Left (shrink) arrow shows whenever the note is longer than its minimum.
        // Min is 2 for fine-mode/triplet/off-grid notes, else TPS (16th = 3).
        const rNeedsFine=note.fine||isTripDur(note.d)||(note.d%TPS!==0)||(step%TPS!==0);
        const rMin=rNeedsFine?2:TPS;
        if(note.d>rMin){const rl=document.createElement('div');rl.className='rh rh-l'+narrowCls;rl.textContent='◀';rl.addEventListener('click',e=>{e.stopPropagation();resizeN(si,step,-1);});blk.appendChild(rl);}
        const rr=document.createElement('div');rr.className='rh rh-r'+narrowCls;rr.textContent='▶';rr.addEventListener('click',e=>{e.stopPropagation();resizeN(si,step,+1);});blk.appendChild(rr);
        blk.addEventListener('click',e=>{if(e.target.classList.contains('rh'))return;e.stopPropagation();openPop(si,step,e.clientX,e.clientY);});
        sr.appendChild(blk);
      }
    });
    bb.appendChild(sr);ba.appendChild(bb);
  }
  const ab=document.createElement('button');ab.className='add-bar-btn';ab.textContent='+';ab.addEventListener('click',addBar);ba.appendChild(ab);
  grid.appendChild(ba);cv.appendChild(grid);if(playing)updGP(ppos);
  updatePbarMarks();
}

function addBar(){bars++;clampLoopInputs();buildCanvas();renderSvg();updatePbar();}
function delBar(b){
  if(playing)stopPlay();const s0=b*SPB,e0=s0+SPB;const nn={};
  Object.entries(notes).forEach(([k,v])=>{const[si,step]=[parseInt(k.split(':')[0]),parseInt(k.split(':')[1])];if(step<s0)nn[k]=v;else if(step>=e0)nn[si+':'+(step-SPB)]=v;});
  notes=nn;bars=Math.max(1,bars-1);ppos=Math.min(ppos,tSteps()-1);clampLoopInputs();buildCanvas();renderSvg();updatePbar();
}
// Deep-copy a note object (including its slide sub-object) for clipboard use
function deepCopyNote(n){
  return{...n, slide:n.slide?{targets:n.slide.targets.slice(),durations:n.slide.durations.slice()}:null};
}
function copyBar(b){
  const s0=b*SPB,e0=s0+SPB;
  const barNotes=[]; // [{si, localStep, note}]
  Object.entries(notes).forEach(([k,v])=>{
    const[si,step]=[parseInt(k.split(':')[0]),parseInt(k.split(':')[1])];
    if(step>=s0&&step<e0)barNotes.push({si,localStep:step-s0,note:deepCopyNote(v)});
  });
  barClip={notes:barNotes,tSig,nStr};
  buildCanvas(); // refresh paste-button enabled state across all bars
}
function pasteBar(b){
  if(!barClip)return;
  const s0=b*SPB,e0=s0+SPB;
  // Clear existing notes whose onset is within the target bar
  Object.keys(notes).forEach(k=>{const[,step]=[parseInt(k.split(':')[0]),parseInt(k.split(':')[1])];if(step>=s0&&step<e0)delete notes[k];});
  let maxEnd=e0;
  barClip.notes.forEach(({si,localStep,note})=>{
    if(si>=gStr().length)return; // skip strings that don't exist on the current string count
    const newStep=s0+localStep;
    const placed=deepCopyNote(note);
    notes[nk(si,newStep)]=placed;
    maxEnd=Math.max(maxEnd,newStep+Math.ceil(dispS(placed)));
  });
  ensureB(maxEnd);
  buildCanvas();renderSvg();updatePbar();
}

function playStep(step,startTime){
  const strs=gStr();
  for(let si=0;si<strs.length;si++){
    const note=notes[nk(si,step)];if(!note)continue;
    if(note.ghost){playGhost(strs[Math.min(note.si??si,strs.length-1)].m,startTime);continue;}
    const dur=durSec(note,effTempo());
    if(note.slide)playSlide(strs,si,note,dur,startTime);
    else playBass(m2f(strs[si].m+note.fret),dur,note.vib,startTime);
  }
}
let lastHlStep=-1;
function clearHlAt(s){
  if(s<0)return;
  // Match the snapped visible column that setHlAt used
  const col=document.getElementById('sc-'+(s-(s%TPS)));if(col)col.classList.remove('playing');
  gStr().forEach((_,si)=>{
    const bl=document.getElementById('nb-'+si+'-'+s);if(bl)bl.classList.remove('playing');
    const svgn=document.getElementById('svgn-'+si+'-'+s);if(svgn)svgn.classList.remove('playing');
    document.querySelectorAll(`[data-owner="${si}-${s}"]`).forEach(c=>c.classList.remove('playing'));
  });
}
function setHlAt(s){
  if(s<0)return;
  // The visible grid column snaps to the containing visible slot (step - step%TPS)
  const col=document.getElementById('sc-'+(s-(s%TPS)));if(col)col.classList.add('playing');
  gStr().forEach((_,si)=>{
    const bl=document.getElementById('nb-'+si+'-'+s);if(bl)bl.classList.add('playing');
    const svgn=document.getElementById('svgn-'+si+'-'+s);if(svgn)svgn.classList.add('playing');
    document.querySelectorAll(`[data-owner="${si}-${s}"]`).forEach(c=>c.classList.add('playing'));
  });
}
function clearAllPlaying(){
  document.querySelectorAll('.step-col.playing,.note-block.playing,.svgn.playing').forEach(el=>el.classList.remove('playing'));
}
function hlStep(step){
  if(step!==lastHlStep){
    // On a backward jump (loop wrap or skip-back), sweep everything clean so no
    // passed-column highlight lingers into the next pass.
    if(step<lastHlStep)clearAllPlaying();
    else clearHlAt(lastHlStep);
    if(step>=0)setHlAt(step);
    lastHlStep=step;
  }
  updGP(step);
  // Only move the static SVG playhead here when not actively animating (animPH owns it during playback)
  if(!playing)updateSvgPH(step);
}

// ── Bar navigation (jump between input area and preview) ────────────
// Scroll the SVG preview so the given bar (0-indexed) is visible.
function scrollPreviewToBar(b){
  const wrap=document.getElementById('tabViewScroll');const svg=document.getElementById('tabSvg');
  if(!wrap||!svg)return;
  const NS=gStr().length;const stepsPerLine=svgBPL*SPB;const LH=NS*SVG_SG+44;
  const line=Math.floor((b*SPB)/stepsPerLine);
  const tY=line*LH;
  wrap.scrollTo({top:tY,behavior:'smooth'});
  // Feedback flash: briefly pulse the notes belonging to this bar
  const s0=b*SPB,e0=s0+SPB;
  const flashed=[];
  gStr().forEach((_,si)=>{for(let s=s0;s<e0;s++){const el=document.getElementById('svgn-'+si+'-'+s);if(el){el.classList.add('flash');flashed.push(el);}}});
  setTimeout(()=>flashed.forEach(el=>el.classList.remove('flash')),700);
}
// Scroll the note-input area horizontally so the given bar is visible.
function scrollInputToBar(b){
  const sc=document.querySelector('.tab-scroll');if(!sc)return;
  const barPx=VIS*SW;
  sc.scrollTo({left:Math.max(0,b*barPx-8),behavior:'smooth'});
  // Feedback flash on the input-area note blocks of this bar
  const s0=b*SPB,e0=s0+SPB;
  const flashed=[];
  gStr().forEach((_,si)=>{for(let s=s0;s<e0;s++){const el=document.getElementById('nb-'+si+'-'+s);if(el){el.classList.add('flash');flashed.push(el);}}});
  setTimeout(()=>flashed.forEach(el=>el.classList.remove('flash')),700);
}
// Delegated click on SVG bar numbers -> scroll the input area to that bar
document.getElementById('tabSvg').addEventListener('click',e=>{
  const t=e.target;
  if(t&&t.classList&&t.classList.contains('bar-num')){
    const b=parseInt(t.getAttribute('data-bar'));
    if(!isNaN(b))scrollInputToBar(b);
  }
});

// ── SVG Preview ────────────────────────────────────────────────────
function renderSvg(){
  const svg=document.getElementById('tabSvg');if(!svg)return;
  const strs=gStr();const NS=strs.length;const CW=getCW();const tot=tSteps();
  const stepsPerLine=svgBPL*SPB;               // internal steps per line
  const SX=CW/TPS;                             // px per internal step (so a visible slot = CW)
  const barW=SPB*SX;                           // px width of one bar (= VIS*CW)
  const lineW=svgBPL*barW;                     // px width of one line
  const nL=Math.max(1,Math.ceil(tot/stepsPerLine));
  const LH=NS*SVG_SG+44;const W=SVG_LP+lineW+SVG_RP;const H=nL*LH+SVG_TP;
  const lc='rgba(255,255,255,.1)',blc='rgba(255,255,255,.35)',lbc='rgba(255,255,255,.3)';
  // x-coordinate (px) of an internal step, relative to the given line start
  const sx=(stepInLine)=>SVG_LP+stepInLine*SX;
  let h='';
  for(let line=0;line<nL;line++){
    const ly=SVG_TP+line*LH;const sc=line*stepsPerLine;
    for(let si=0;si<NS;si++){const sy=ly+si*SVG_SG+SVG_SG;h+=`<line x1="${SVG_LP}" y1="${sy}" x2="${SVG_LP+lineW}" y2="${sy}" stroke="${lc}" stroke-width="1"/>`;h+=`<text x="${SVG_LP-3}" y="${sy+4}" text-anchor="end" font-size="11" fill="${lbc}" font-family="monospace">${strs[si].n}</text>`;}
    for(let bar=0;bar<=svgBPL;bar++){const bx=SVG_LP+bar*barW;h+=`<line x1="${bx}" y1="${ly+SVG_SG}" x2="${bx}" y2="${ly+NS*SVG_SG+SVG_SG}" stroke="${blc}" stroke-width="1.5"/>`;if(bar<svgBPL){const bn=line*svgBPL+bar+1;if(bn<=bars)h+=`<text class="bar-num" data-bar="${bn-1}" x="${bx+2}" y="${ly+SVG_SG-7}" font-size="9" fill="${lbc}" style="cursor:pointer">${bn}</text>`;}}
    // Beat gridlines (every 12 steps = one quarter), skipping bar lines
    for(let st=0;st<stepsPerLine;st+=SPB/tSig){const step=sc+st;if(step>=tot)break;if(st%SPB!==0){const bx=sx(st);h+=`<line x1="${bx}" y1="${ly+SVG_SG}" x2="${bx}" y2="${ly+NS*SVG_SG+SVG_SG}" stroke="${lc}" stroke-width=".6" stroke-dasharray="2,2"/>`;}}
    // Draw continuations of notes that started in a PREVIOUS line and still sustain into this one
    for(let si=0;si<NS;si++){
      let contStep=null,contNote=null;
      for(let s=Math.max(0,sc-96);s<sc;s++){
        const n=notes[nk(si,s)];
        if(n&&!n.ghost&&s+Math.ceil(dispS(n))>sc){contStep=s;contNote=n;}
      }
      if(contNote==null)continue;
      const sy=ly+si*SVG_SG+SVG_SG;
      const solidEndStep=contStep+contNote.d;
      const fullEndStep=contStep+dispS(contNote);
      const lineEndStep=sc+stepsPerLine;
      const drawEnd=Math.min(fullEndStep,lineEndStep,tot);
      if(drawEnd<=sc)continue;
      const baseOpacity=contNote.stac?.18:.45;
      const solidDrawEnd=Math.min(solidEndStep,drawEnd);
      if(solidDrawEnd>sc){
        const x1=sx(0),x2=sx(solidDrawEnd-sc);
        h+=`<g class="svgn" data-owner="${si}-${contStep}"><line x1="${x1}" y1="${sy}" x2="${x2}" y2="${sy}" stroke="currentColor" stroke-width="${CW===10?2:3}" stroke-linecap="round" opacity="${baseOpacity}"/></g>`;
      }
      if(drawEnd>solidEndStep){
        const dx1=sx(Math.max(0,solidEndStep-sc)),dx2=sx(drawEnd-sc);
        h+=`<g class="svgn" data-owner="${si}-${contStep}"><line x1="${dx1}" y1="${sy}" x2="${dx2}" y2="${sy}" stroke="currentColor" stroke-width="${CW===10?2:3}" stroke-linecap="round" opacity=".18"/></g>`;
      }
    }
    for(let st=0;st<stepsPerLine;st++){
      const step=sc+st;if(step>=tot)break;const cx=sx(st)+SX/2;
      for(let si=0;si<NS;si++){
        const note=notes[nk(si,step)];if(!note)continue;
        const ig=!!note.ghost,ds=dispS(note),id=!!note.dot,ist=!!note.stac,iv=!!note.vib;
        const sy=ly+si*SVG_SG+SVG_SG,r=CW===10?7:9;
        h+=`<g class="svgn${isTripDur(note.d)?' trip':''}" id="svgn-${si}-${step}">`;
        if(ig){h+=`<text x="${cx}" y="${sy+4}" text-anchor="middle" font-size="12" font-weight="500" fill="currentColor" font-family="monospace">×</text>`;}
        else{
          let fs=String(note.fret);
          if(note.slide)fs+=note.slide.targets.map(t=>(t>note.fret?'/':'\\')+t).join('');
          h+=`<rect x="${cx-r}" y="${sy-r}" width="${r*2}" height="${r*2}" rx="${r}" fill="currentColor"/>`;
          const fsz=fs.length>4?(CW===10?5:7):fs.length>2?(CW===10?6:8):(CW===10?8:11);
          h+=`<text x="${cx}" y="${sy+3}" text-anchor="middle" font-size="${fsz}" font-weight="500" fill="white" font-family="monospace">${fs}</text>`;
          if(id)h+=`<text x="${cx+r+2}" y="${sy-r+2}" font-size="9" font-weight="700" fill="currentColor">.</text>`;
          if(iv)h+=`<text x="${cx}" y="${sy-r-3}" text-anchor="middle" font-size="8" fill="currentColor">~</text>`;
          if(ist)h+=`<text x="${cx}" y="${sy+r+8}" text-anchor="middle" font-size="8" fill="currentColor">·</text>`;
          if(ds>TPS){const bE=Math.min(step+note.d-sc,stepsPerLine),bX=sx(bE)-SX/2+r;if(bX>cx+r+1)h+=`<line x1="${cx+r+1}" y1="${sy}" x2="${bX}" y2="${sy}" stroke="currentColor" stroke-width="${CW===10?2:3}" stroke-linecap="round" opacity="${ist?.18:.45}"/>`;if(id){const dE=Math.min(step+ds-sc,stepsPerLine),dX=sx(dE)-SX/2+r;if(dX>bX)h+=`<line x1="${bX}" y1="${sy}" x2="${dX}" y2="${sy}" stroke="currentColor" stroke-width="${CW===10?2:3}" stroke-linecap="round" opacity=".18"/>`;}}
        }
        h+=`</g>`;
      }
    }
  }
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('width',W);svg.setAttribute('height',H);svg.innerHTML=h;
  phLine=null;phLastScrollLine=-1; // SVG innerHTML replaced; cached playhead line is stale
  const wrap=document.getElementById('tabViewScroll');if(wrap){const tH=LH*2+SVG_TP+20;wrap.style.maxHeight=tH+'px';wrap.style.overflowY=nL>2?'auto':'hidden';}
}

buildCanvas();renderSvg();
setTimeout(()=>{updatePbar();updatePbarMarks();},100);
</script>
