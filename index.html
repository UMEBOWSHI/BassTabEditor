<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google-site-verification" content="zrvaRkCMaoIkopVidZuH9JteueUaKaNOmAluN2LMt9w" />
<title>Bass Tab Editor</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8413396585955977" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--border:#333;--border2:#444;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --blue:#2a7fd4;--blue2:#1a5fa0;--amber:#e8a020;
  --green:#1a9e6a;--purple:#7c3aed;--red:#c0392b;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
h1{font-size:18px;font-weight:700;color:var(--amber);letter-spacing:0.05em}
.app{max-width:780px;margin:0 auto;padding:16px 12px}
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.topbar h1{flex:1}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.lbl{font-size:12px;color:var(--text2);white-space:nowrap}
select,input[type=number]{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:4px 8px;font-size:12px;cursor:pointer}
select:focus,input[type=number]:focus{outline:none;border-color:var(--blue)}
input[type=range]{flex:1;max-width:110px;accent-color:var(--amber)}
.val{font-size:12px;font-weight:600;min-width:52px;text-align:center;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 11px;border:1px solid var(--border2);border-radius:5px;background:var(--bg3);color:var(--text);cursor:pointer;transition:all .12s;user-select:none}
.btn:hover{background:var(--bg2);border-color:var(--text3)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue2)}
.btn.sm{padding:3px 7px;font-size:11px}
.btn.active,.btn.on-loop{background:var(--green);border-color:var(--green);color:#fff}
.divider{display:flex;align-items:center;gap:8px;margin:12px 0 8px}
.divider span{font-size:11px;color:var(--text3);white-space:nowrap}
.divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.hint{font-size:11px;color:var(--text3);margin-bottom:8px}
/* Tab grid */
.tab-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--bg2);margin-bottom:10px}
.tab-canvas-wrap{display:inline-block;min-width:100%}
.tab-grid-wrap{display:flex}
.string-labels{display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0}
.string-lbl{width:34px;height:44px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2)}
.string-lbl.low{color:var(--amber)}
.bars-area{display:flex;flex:1;position:relative}
.bar-block{display:flex;flex-direction:column;border-right:2px solid var(--border2);flex-shrink:0}
.bar-block:first-child{border-left:2px solid var(--border2)}
.bar-header{height:18px;display:flex;align-items:center;padding-left:5px;font-size:9px;color:var(--text3);border-bottom:1px solid var(--border);gap:4px}
.bar-del{cursor:pointer;opacity:.4;font-size:10px}
.bar-del:hover{opacity:1;color:var(--red)}
.bar-act{cursor:pointer;opacity:.45;font-size:10px}
.bar-jump{cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.bar-jump:hover{color:var(--blue)}
.bar-act:hover{opacity:1}
.bar-act.dis{opacity:.15;cursor:default;pointer-events:none}
.steps-row{display:flex;position:relative}
.step-col{width:44px;flex-shrink:0;border-right:1px solid var(--border);position:relative}
.step-col:last-child{border-right:none}
.step-col.beat{border-left:1px solid #444}
.step-col.playing{background:rgba(42,127,212,.1)}
.string-lane{height:44px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.string-lane:hover{background:rgba(255,255,255,.03)}
.string-line{width:36px;height:1px;background:var(--border2);position:absolute;pointer-events:none}
.note-block{position:absolute;height:27px;border-radius:4px;background:var(--blue);z-index:10;cursor:pointer;overflow:hidden}
.note-block:hover{filter:brightness(1.15)}
.note-block.playing{background:var(--amber)}
.note-block.ghost{background:transparent;border:1.5px dashed var(--blue)}
.note-block.ghost.playing{border-color:var(--amber)}
.note-block.trip{background:var(--purple)}
.note-block.trip.ghost{background:transparent;border-color:var(--purple)}
.note-inner{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0 3px;z-index:3}
.note-fret{font-size:11px;font-weight:700;color:#fff;font-family:monospace;line-height:1;white-space:nowrap}
.ghost .note-fret{color:var(--blue);font-size:13px}
.ghost.playing .note-fret{color:var(--amber)}
.note-meta{display:flex;align-items:center;gap:1px;font-size:8px;color:rgba(255,255,255,.6)}
.slide-seg{position:absolute;top:0;bottom:0;z-index:1;border-right:1px solid rgba(255,255,255,.25)}
.slide-seg.hold{background:rgba(255,255,255,.05)}
.slide-seg.slide{background:rgba(124,58,237,.25)}
.dot-fade{position:absolute;top:0;right:0;bottom:0;background:rgba(255,255,255,.25);z-index:1}
.stac-ghost{position:absolute;top:0;bottom:0;right:0;border:1.5px dashed rgba(255,255,255,.4);border-left:none;z-index:1}
.vib-lbl{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.75);z-index:3;pointer-events:none}
.rh{position:absolute;top:2px;bottom:2px;width:15px;display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;z-index:20;user-select:none;background:rgba(0,0,0,.45);border-radius:3px}
.rh.narrow{width:9px;font-size:7px}
.note-block:hover .rh{display:flex}
.rh-l{left:1px}.rh-r{right:1px}
.rh:hover{background:rgba(0,0,0,.7)}
.playhead{position:absolute;top:0;bottom:0;width:2px;background:rgba(42,127,212,.8);pointer-events:none;z-index:20;display:none}
.playhead.visible{display:block}
.add-bar-btn{width:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;border:none;color:var(--text3);font-size:18px;opacity:.4;transition:opacity .1s;padding:0 3px;align-self:stretch;flex-shrink:0}
.add-bar-btn:hover{opacity:.8}
/* SVG preview */
.tab-view-outer{border:1px solid var(--border);border-radius:8px;background:var(--bg2)}
.tab-view-scroll{overflow-x:auto;overflow-y:auto}
.tab-svg{display:block}
.svgn{color:#2a7fd4}
.svgn.trip{color:#7c3aed}
.svgn.playing{color:#e8a020}
.svgn.flash{animation:flashPulse .7s ease-out}
.note-block.flash{animation:flashPulse .7s ease-out}
@keyframes flashPulse{0%{filter:brightness(2.2)}100%{filter:brightness(1)}}
/* Transport */
.transport-bar{border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--bg2);margin-bottom:10px}
.transport-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.transport-row:last-child{margin-bottom:0}
.pbar-wrap{position:relative;height:28px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;cursor:pointer;overflow:hidden;flex:1;min-width:100px}
.pbar-fill{position:absolute;top:0;left:0;bottom:0;background:var(--blue);opacity:.25;pointer-events:none}
.pbar-head{position:absolute;top:0;bottom:0;width:3px;background:var(--amber);pointer-events:none;transform:translateX(-50%)}
.pbar-marks{position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none}
.pbar-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:var(--text3);pointer-events:none;white-space:nowrap}
.loop-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
.loop-inp{width:52px;font-size:12px;padding:3px 5px;text-align:center;-moz-appearance:textfield}
.loop-inp::-webkit-outer-spin-button,.loop-inp::-webkit-inner-spin-button{-webkit-appearance:none}
/* Popup */
.pop{position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.pop-inner{display:flex;gap:16px;align-items:flex-start}
.pop-left{width:250px;flex-shrink:0}
.pop-right{width:260px;flex-shrink:0;display:none;border-left:1px solid var(--border);padding-left:14px}
.pop-right.vis{display:block}
.pop-right-title{font-size:11px;color:var(--text3);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.pop-tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pop-title{font-size:12px;color:var(--text2)}
.pop-cbs{display:flex;gap:6px}
.pop-cbs .btn{padding:7px 12px;font-size:14px}
.pop-field{margin-bottom:10px}
.pop-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.pop-field input[type=number]{width:84px;font-size:15px;padding:6px 9px;-moz-appearance:textfield}
.pop-field input[type=number]::-webkit-outer-spin-button,.pop-field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.pop-field input[type=number]:focus{outline:none;border-color:var(--blue)}
.pop-field select{width:100%;font-size:13px;padding:6px 8px}
.pop-field.dis{opacity:.35;pointer-events:none}
.mod-sec{margin-bottom:10px}
.mod-sec-lbl{font-size:11px;color:var(--text3);margin-bottom:5px}
.mod-row{display:flex;gap:5px;flex-wrap:wrap}
.mod-btn{padding:7px 6px;font-size:11px;border-radius:6px;cursor:pointer;text-align:center;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:3px;border:1.5px solid var(--border2);background:var(--bg3);color:var(--text2);min-width:48px}
.mod-btn:hover{border-color:var(--text3)}
.mod-btn.on-dot{border-color:var(--blue);background:#1a3a5c;color:#7ab8f0}
.mod-btn.on-ghost{border-color:#666;background:#2a2a2a;color:#bbb}
.mod-btn.on-stac{border-color:var(--amber);background:#3a2a08;color:#e8c060}
.mod-btn.on-vib{border-color:var(--green);background:#0a2a1a;color:#60c090}
.mod-btn.on-slide{border-color:var(--purple);background:#2a1a4a;color:#c4a0f0}
.mod-btn .mi{font-size:13px}
.mod-btn .ml{font-size:9px}
/* Slide dest list */
.slide-dest-list{margin-bottom:8px}
.sdest-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.sdest-lbl{font-size:11px;color:var(--text3);min-width:28px}
.sdest-inp{width:66px;font-size:13px;padding:5px 7px;-moz-appearance:textfield}
.sdest-inp::-webkit-outer-spin-button,.sdest-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.sdest-rm{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:4px;cursor:pointer;font-size:11px;color:var(--text3);background:var(--bg3);flex-shrink:0}
.sdest-rm:hover{border-color:var(--red);color:var(--red)}
.sdest-add-row{display:flex;align-items:center;gap:5px;margin-top:3px;margin-bottom:8px}
/* Zone panel */
.zone-panel{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px}
.zone-panel-title{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600}
.zone-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.step-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text);user-select:none;flex-shrink:0}
.step-btn:hover:not([disabled]){background:var(--bg2)}
.step-btn[disabled]{opacity:.25;cursor:default}
.zone-num-inp{width:34px;font-size:11px;font-weight:600;text-align:center;padding:2px 3px;-moz-appearance:textfield}
.zone-num-inp::-webkit-outer-spin-button,.zone-num-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.zone-diagram{margin-top:5px;border-radius:4px;overflow:hidden;display:flex;height:24px;border:1px solid rgba(124,58,237,.3)}
.zd-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap;transition:flex .1s}
.zd-anchor{background:rgba(124,58,237,.6)}
.zd-slide{background:rgba(124,58,237,.2);color:rgba(180,140,255,.9)}
.mod-btn .mi{font-size:11px;font-weight:700;line-height:1}
.mod-btn .ml{font-size:8px;line-height:1}
.mod-btn.off .mi,.mod-btn.off .ml{opacity:.3}
/* Popup actions */
.pop-acts{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pop-acts .btn{flex:1;padding:9px 10px;font-size:13px;justify-content:center}
.pop-del{color:var(--red);border-color:rgba(192,57,43,.4)}
.pop-del:hover{background:rgba(192,57,43,.1)}
/* IO */
.io-panel{border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg2)}
.io-panel-title{font-size:11px;color:var(--text2);margin-bottom:7px}
.io-ta{width:100%;height:68px;font-size:10px;font-family:monospace;padding:7px;border:1px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--text);resize:vertical;outline:none}
.io-ta:focus{border-color:var(--blue)}
.io-row{display:flex;gap:7px;margin-top:7px;align-items:center;flex-wrap:wrap}
.io-ok{font-size:10px;color:var(--green)}
.io-err{font-size:10px;color:var(--red)}
.status-bar{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:11px;color:var(--text3)}
/* My tabs list */
.mytab-row{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;flex-wrap:wrap}
.mytab-title{flex:1;font-size:13px;color:var(--text);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mytab-date{font-size:10px;color:var(--text3);white-space:nowrap}
.mytab-acts{display:flex;gap:4px;flex-shrink:0}
.mytab-acts .btn{padding:4px 8px;font-size:11px}
.mytab-empty{font-size:12px;color:var(--text3);padding:8px 0}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:background .1s}
.sdot.playing{background:var(--green)}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>🎸 Bass Tab Editor</h1>
  <div id="acctArea" style="display:flex;gap:8px;align-items:center;margin-right:10px">
    <span class="lbl" id="acctStatus">未ログイン</span>
    <button class="btn sm" id="loginBtn">ログイン</button>
    <button class="btn sm" id="logoutBtn" style="display:none">ログアウト</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="lbl">弦数</span>
    <select id="stringSel"><option value="4" selected>4弦</option><option value="5">5弦</option><option value="6">6弦</option></select>
    <span class="lbl">拍子</span>
    <select id="timeSig"><option value="4">4/4</option><option value="3">3/4</option><option value="6">6/8</option></select>
  </div>
</div>
<div class="row">
  <span class="lbl">テンポ</span>
  <button class="btn" id="tm">−</button>
  <input type="range" id="tempoSl" min="40" max="240" value="80">
  <button class="btn" id="tp">＋</button>
  <span class="val"><span id="tempoV">80</span> BPM</span>
</div>
<div class="row">
  <span class="lbl">再生速度</span>
  <button class="btn" id="spm">−</button>
  <input type="range" id="speedSl" min="0.25" max="2" step="0.05" value="1">
  <button class="btn" id="spp">＋</button>
  <span class="val"><span id="speedV">1.00</span>x</span>
  <button class="btn sm" id="spReset">リセット</button>
</div>
<div class="row">
  <span class="lbl">音量</span>
  <button class="btn" id="vm">−</button>
  <input type="range" id="volSl" min="0" max="100" value="25">
  <button class="btn" id="vp">＋</button>
  <span class="val"><span id="volV">25</span></span>
  <button class="btn" id="clearBtn">🗑 クリア</button>
</div>
<div class="row">
  <span class="lbl">メトロノーム</span>
  <button class="btn sm" id="metroToggle">OFF</button>
  <select id="metroDurSel"></select>
</div>
<div class="row">
  <span class="lbl">メトロノーム音量</span>
  <button class="btn" id="mvm">−</button>
  <input type="range" id="metroVolSl" min="0" max="100" value="60">
  <button class="btn" id="mvp">＋</button>
  <span class="val"><span id="metroVolV">60</span></span>
</div>
<!-- Transport -->
<div class="transport-bar">
  <div class="transport-row">
    <button class="btn sm" id="rewindBtn">⏮ 最初</button>
    <button class="btn sm" id="skip4Back">−4小節</button>
    <button class="btn sm" id="skipBarBack">−1小節</button>
    <button class="btn primary" id="playBtn">▶ 再生</button>
    <button class="btn sm" id="skipBarFwd">+1小節</button>
    <button class="btn sm" id="skip4Fwd">+4小節</button>
    <button class="btn sm" id="loopBtn">🔁 ループ OFF</button>
  </div>
  <div class="pbar-wrap" id="pbarWrap">
    <div class="pbar-fill" id="pbarFill"></div>
    <svg class="pbar-marks" id="pbarMarks" style="position:absolute;top:0;left:0;width:100%;height:100%"></svg>
    <div class="pbar-head" id="pbarHead"></div>
    <div class="pbar-label" id="pbarLabel">小節 1 · step 1</div>
  </div>
  <div class="loop-row" id="loopRow" style="display:none">
    <span class="lbl">ループ開始小節</span>
    <input type="number" class="loop-inp" id="loopStart" min="1" placeholder="1">
    <span class="lbl">〜終了小節</span>
    <input type="number" class="loop-inp" id="loopEnd" min="1" placeholder="最後">
    <span style="font-size:10px;color:var(--text3)">空欄=先頭/末尾</span>
  </div>
</div>
<div class="hint">弦の線をクリックして音符を追加。再生バーをドラッグして位置移動。</div>
<div class="tab-scroll"><div class="tab-canvas-wrap" id="tabCanvas"></div></div>
<div class="divider"><span>タブ譜プレビュー</span><hr>
  <button class="btn sm" id="barsToggle">2小節表示</button>
  <button class="btn sm active" id="scrollToggle">自動スクロール ON</button>
</div>
<div class="tab-view-outer"><div class="tab-view-scroll" id="tabViewScroll"><svg id="tabSvg" class="tab-svg"></svg></div></div>
<div class="divider"><span>保存・読み込み</span><hr></div>
<div class="io-panel">
  <div class="io-panel-title">テキストコードでエクスポート／インポート</div>
  <textarea class="io-ta" id="ioTa" placeholder="エクスポートするとここにコードが表示されます。"></textarea>
  <div class="io-row">
    <button class="btn sm" id="exportBtn">↑ エクスポート</button>
    <button class="btn sm primary" id="importBtn">↓ インポート</button>
    <button class="btn sm" id="copyBtn">コピー</button>
    <span id="ioMsg"></span>
  </div>
</div>
<div class="divider"><span>クラウド保存</span><hr></div>
<div class="io-panel" id="cloudPanel">
  <div class="io-panel-title" id="cloudHint">ログインすると、タブ譜をクラウドに保存できます。</div>
  <div id="cloudLoggedInArea" style="display:none">
    <div class="io-row" style="margin-top:0">
      <input type="text" id="saveTitleInp" placeholder="タブ譜のタイトル" style="flex:1;min-width:140px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:6px 9px;font-size:13px">
      <button class="btn sm primary" id="cloudSaveBtn">☁ 保存</button>
      <span id="cloudMsg"></span>
    </div>
    <div class="divider" style="margin:12px 0 8px"><span>マイタブ譜</span><hr></div>
    <div id="myTabsList" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</div>
<div class="status-bar"><div class="sdot" id="sdot"></div><span id="statusTxt">停止中</span></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────
// ── Time resolution ────────────────────────────────────────────────
// Internal resolution is 48 divisions per 4/4 bar (TPQ=12, i.e. a quarter
// note = 12 steps). This lets triplets sit on integer steps: an 8th-note
// triplet note = 4 steps, a 16th-note triplet note = 2 steps.
// The VISIBLE grid still shows 16 slots per bar (unchanged look); each
// visible slot spans TPS=3 internal steps. Notes are positioned by step/TPS.
const SPB=48;      // internal steps per bar
const VIS=16;      // visible grid slots per bar
const TPS=3;       // internal steps per visible slot (SPB/VIS)
const SW=44;       // px width per visible slot
const DDUR=12;     // default note length = quarter note (12 steps)
const STRS={
  4:[{n:'G',m:43},{n:'D',m:38},{n:'A',m:33},{n:'E',m:28}],
  5:[{n:'G',m:43},{n:'D',m:38},{n:'A',m:33},{n:'E',m:28},{n:'B',m:23}],
  6:[{n:'C',m:48},{n:'G',m:43},{n:'D',m:38},{n:'A',m:33},{n:'E',m:28},{n:'B',m:23}]
};
// Durations in 48-division steps
const DURS=[{l:'十六分音符',v:3},{l:'八分音符',v:6},{l:'四分音符',v:12},{l:'二分音符',v:24},{l:'全音符',v:48},{l:'半拍三連符',v:2},{l:'一拍三連符',v:4},{l:'二拍三連符',v:8},{l:'全拍三連符',v:16}];
// Standard (non-triplet) lengths, used to decide when to show a "(n)" suffix
const STD_DURS=[3,6,12,24,48];
// Triplet lengths: half-beat(2), 1-beat(4), 2-beat(8), 4-beat(16) triplet note.
// A note whose length is one of these is displayed in the triplet color.
const TRIP_DURS=[2,4,8,16];
function isTripDur(d){return TRIP_DURS.includes(d);}

const SVG_LP=30,SVG_TP=22,SVG_SG=24,SVG_RP=12;
let svgBPL=4,autoSc=true;
function getCW(){return svgBPL===4?10:20}

let playing=false,ptimer=null,ppos=0;
let afId=null,pst=0,psp=0,ptempo=80;
let tSig=4,tempo=80,nStr=4,bars=1,volDisp=25,playbackSpeed=1;
// Displayed volume is 0–100; gain = (disp/100)*VOL_MAX_GAIN. disp=25 => gain 1.0
// (unaltered), disp=100 => gain 4.0 (much louder, previously the ceiling was 2.0).
const VOL_MAX_GAIN=4.0;
function volGain(){return (volDisp/100)*VOL_MAX_GAIN;}
let metroOn=false,metroDur=12,metroVol=0.6; // metroDur in 48-division steps (12 = quarter note)
// Effective tempo used for all audio scheduling/timing math. Playback speed
// is independent of the displayed BPM: it scales timing only. Since pitch
// (frequency) is set directly via m2f() rather than derived from duration,
// changing this does NOT alter pitch — only how fast events play out.
function effTempo(){return tempo*playbackSpeed;}
let notes={},clip=null,barClip=null;
let loopOn=false,loopSBar=null,loopEBar=null;

function gStr(){return STRS[nStr]}
function tSteps(){return bars*SPB}
function nk(si,s){return si+':'+s}
function m2f(m){return 440*Math.pow(2,(m-69)/12)}
function dispS(n){return n.dot?n.d*1.5:n.d}          // effective length in 48-division steps
function durSec(n,t){let s=n.d;if(n.dot)s*=1.5;if(n.stac)s*=0.5;return(60/t)*(s/12)}  // 12 steps = 1 quarter = 1 beat
function hss(){return(60/tempo)*(1/12)} // one 48-division step in sec (unused legacy)
// Total slide sub-steps available for a note = its length in 48-division steps.
function gmxFor(note){const eff=note.dot?note.d*1.5:note.stac?note.d*0.5:note.d;return Math.max(1,Math.floor(eff));}
// Visible-slot X position (in px) for an internal step within a bar
function stepX(sInBar){return (sInBar/TPS)*SW;}

// ── Slide core (pure functions) ──────────────────────────────────
// INVARIANT: durations.length===2*targets.length+1; sum(durations)===total;
// hold(even idx)>=0; slide(odd idx)>=1. All mutation goes through these fns.
function slIsSlideIdx(i){return i%2===1;}
function slMinForIdx(i){return slIsSlideIdx(i)?1:0;}
function slMinTotal(n){return n;}
function slNormalize(slide,totalSteps){
  const n=slide.targets.length;
  let durs=slide.durations?slide.durations.slice():[];
  const wantLen=2*n+1;
  while(durs.length<wantLen)durs.push(0);
  if(durs.length>wantLen)durs=durs.slice(0,wantLen);
  for(let i=0;i<durs.length;i++)durs[i]=Math.max(slMinForIdx(i),Math.floor(durs[i]||0));
  const floor=slMinTotal(n);
  const target=Math.max(totalSteps,floor);
  let sum=durs.reduce((a,b)=>a+b,0);
  if(sum<target){durs[0]+=(target-sum);}
  else if(sum>target){
    let excess=sum-target;
    for(let i=durs.length-1;i>=0&&excess>0;i--){if(!slIsSlideIdx(i)){const take=Math.min(durs[i],excess);durs[i]-=take;excess-=take;}}
    for(let i=durs.length-1;i>=0&&excess>0;i--){if(slIsSlideIdx(i)){const take=Math.min(durs[i]-1,excess);durs[i]-=take;excess-=take;}}
  }
  return{targets:slide.targets.slice(),durations:durs,total:target};
}
function slCreate(targetFret,totalSteps){return slNormalize({targets:[targetFret],durations:[0,1,0]},totalSteps);}
function slAddTarget(slide,newFret,totalSteps){
  const targets=slide.targets.concat([newFret]);
  const durations=slide.durations.concat([1,0]);
  const norm=slNormalize({targets,durations},totalSteps);
  return{slide:{targets:norm.targets,durations:norm.durations},newTotalSteps:norm.total};
}
function slRemoveTarget(slide,i,totalSteps){
  const targets=slide.targets.slice();targets.splice(i,1);
  let durs=slide.durations.slice();
  const slideIdx=2*i+1,holdIdx=2*i+2;
  const removed=(durs[slideIdx]||0)+(durs[holdIdx]||0);
  durs.splice(slideIdx,2);durs[2*i]=(durs[2*i]||0)+removed;
  if(targets.length===0)return{slide:null,newTotalSteps:totalSteps};
  const norm=slNormalize({targets,durations:durs},totalSteps);
  return{slide:{targets:norm.targets,durations:norm.durations},newTotalSteps:norm.total};
}
function slNormalizeAbsorb(slide,totalSteps,lockedIdx){
  let durs=slide.durations.slice();
  for(let i=0;i<durs.length;i++)durs[i]=Math.max(slMinForIdx(i),Math.floor(durs[i]||0));
  let sum=durs.reduce((a,b)=>a+b,0);
  let diff=totalSteps-sum;
  if(diff>0){
    let placed=false;
    for(let i=0;i<durs.length&&!placed;i++){if(!slIsSlideIdx(i)&&i!==lockedIdx){durs[i]+=diff;placed=true;}}
    if(!placed)durs[0]+=diff;
  } else if(diff<0){
    let excess=-diff;
    for(let i=durs.length-1;i>=0&&excess>0;i--){if(!slIsSlideIdx(i)&&i!==lockedIdx){const take=Math.min(durs[i],excess);durs[i]-=take;excess-=take;}}
    for(let i=durs.length-1;i>=0&&excess>0;i--){if(slIsSlideIdx(i)&&i!==lockedIdx){const take=Math.min(durs[i]-1,excess);durs[i]-=take;excess-=take;}}
    if(excess>0&&!slIsSlideIdx(lockedIdx)){const take=Math.min(durs[lockedIdx],excess);durs[lockedIdx]-=take;excess-=take;}
  }
  return{targets:slide.targets.slice(),durations:durs};
}
function slSetDuration(slide,idx,value,totalSteps){
  let durs=slide.durations.slice();
  const minv=slMinForIdx(idx);
  value=Math.max(minv,Math.floor(value||0));
  let othersMin=0;
  for(let i=0;i<durs.length;i++)if(i!==idx)othersMin+=slMinForIdx(i);
  value=Math.min(value,Math.max(minv,totalSteps-othersMin));
  durs[idx]=value;
  const norm=slNormalizeAbsorb({targets:slide.targets.slice(),durations:durs},totalSteps,idx);
  return{slide:{targets:norm.targets,durations:norm.durations},newTotalSteps:totalSteps};
}

// ── Audio init ─────────────────────────────────────────────────────
let actx=null,mgain=null,limiter=null,metroGain=null;
function initAudio(){
  if(!actx||actx.state==='closed'){
    actx=new(window.AudioContext||window.webkitAudioContext)();
    mgain=actx.createGain();mgain.gain.value=volGain();
    // Limiter: prevents harsh crackling/clipping when the volume boost pushes
    // the signal above 0dBFS (e.g. several overlapping notes at high gain).
    limiter=actx.createDynamicsCompressor();
    limiter.threshold.setValueAtTime(-6,actx.currentTime);
    limiter.knee.setValueAtTime(0,actx.currentTime);
    limiter.ratio.setValueAtTime(20,actx.currentTime);
    limiter.attack.setValueAtTime(0.003,actx.currentTime);
    limiter.release.setValueAtTime(0.1,actx.currentTime);
    mgain.connect(limiter);
    // Metronome has its own gain (independent volume from note playback),
    // but shares the same limiter so it can't cause clipping either.
    metroGain=actx.createGain();metroGain.gain.value=metroVol;
    metroGain.connect(limiter);
    limiter.connect(actx.destination);
  }
  return actx;
}
function getM(){initAudio();return mgain}

// Kill all audio immediately – use AudioContext suspend then resume
function silenceNow(){
  if(!actx)return;
  // Ramp to zero in 15ms then restore
  const g=mgain.gain;
  g.cancelScheduledValues(actx.currentTime);
  g.setValueAtTime(g.value,actx.currentTime);
  g.linearRampToValueAtTime(0.0001,actx.currentTime+0.015);
  setTimeout(()=>{if(mgain){mgain.gain.cancelScheduledValues(actx.currentTime);mgain.gain.setValueAtTime(volGain(),actx.currentTime);}},25);
}

// ── Bass synth ─────────────────────────────────────────────────────
function makeBassSeamless(ctx,t0,dur,freqSched,vib){
  if(dur<=0)return;
  const mg=getM();
  const tri=ctx.createOscillator();tri.type='triangle';
  const sub=ctx.createOscillator();sub.type='sine';
  const subG=ctx.createGain();subG.gain.value=0.3;sub.connect(subG);
  for(let i=0;i<freqSched.length;i++){
    const{t,f,gl}=freqSched[i];const at=t0+t;
    if(gl&&i>0){tri.frequency.linearRampToValueAtTime(f,at);sub.frequency.linearRampToValueAtTime(f/2,at);}
    else{tri.frequency.setValueAtTime(f,at);sub.frequency.setValueAtTime(f/2,at);}
  }
  if(vib){const lfo=ctx.createOscillator();const lG=ctx.createGain();lfo.frequency.value=5.5;lG.gain.value=3.5;lfo.connect(lG);lG.connect(tri.frequency);lG.connect(sub.frequency);lfo.start(t0);lfo.stop(t0+dur+0.15);}
  // Attack noise
  const asz=Math.floor(ctx.sampleRate*0.018);const abuf=ctx.createBuffer(1,asz,ctx.sampleRate);
  const ad=abuf.getChannelData(0);for(let i=0;i<asz;i++)ad[i]=(Math.random()*2-1)*(1-i/asz);
  const asrc=ctx.createBufferSource();asrc.buffer=abuf;
  const abp=ctx.createBiquadFilter();abp.type='bandpass';abp.frequency.value=freqSched[0].f*2;abp.Q.value=1;
  const aG=ctx.createGain();aG.gain.setValueAtTime(0.35,t0);aG.gain.exponentialRampToValueAtTime(0.001,t0+0.018);
  asrc.connect(abp);abp.connect(aG);aG.connect(mg);asrc.start(t0);asrc.stop(t0+0.02);
  const ws=ctx.createWaveShaper();
  ws.curve=(()=>{const n=128,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=x*(1+0.8*Math.abs(x))/(1+0.8);}return c;})();
  ws.oversample='2x';
  const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=800;lpf.Q.value=1.2;
  const shelf=ctx.createBiquadFilter();shelf.type='highshelf';shelf.frequency.value=1200;shelf.gain.value=-8;
  const mix=ctx.createGain();mix.gain.value=1;
  tri.connect(ws);ws.connect(mix);subG.connect(mix);mix.connect(lpf);lpf.connect(shelf);
  const amp=ctx.createGain();shelf.connect(amp);amp.connect(mg);
  const atk=0.006,dec=Math.min(0.09,dur*0.15),sus=0.65,rel=Math.min(0.1,dur*0.08);
  amp.gain.setValueAtTime(0,t0);amp.gain.linearRampToValueAtTime(0.9,t0+atk);
  amp.gain.exponentialRampToValueAtTime(sus,t0+atk+dec);
  amp.gain.setValueAtTime(sus,t0+Math.max(atk+dec,dur-rel));
  amp.gain.exponentialRampToValueAtTime(0.001,t0+dur+0.03);
  [tri,sub].forEach(o=>{o.start(t0);o.stop(t0+dur+0.06);});
}

function playBass(f,dur,vib,startTime){const ctx=initAudio();makeBassSeamless(ctx,startTime??ctx.currentTime,dur,[{t:0,f,gl:false}],vib||false)}

// Build freqSched from note.fret + note.slide.durations and play seamlessly.
// durations are in 32nd-note steps; convert each to seconds via hss().
function playSlide(strs,si,note,totalDurSec,startTime){
  const ctx=initAudio();const t0=startTime??ctx.currentTime;
  const baseMidi=strs[si].m;
  const slide=note.slide;
  const allFrets=[note.fret,...slide.targets];
  const durs=slide.durations;
  const totalSteps=durs.reduce((a,b)=>a+b,0);
  const secPerStep=totalSteps>0?totalDurSec/totalSteps:0;
  let t=0;const sched=[];
  // Initial frequency at t=0 (start of first hold)
  sched.push({t:0,f:m2f(baseMidi+allFrets[0]),gl:false});
  for(let seg=0;seg<durs.length;seg++){
    const segSec=durs[seg]*secPerStep;
    if(slIsSlideIdx(seg)){
      const fromFret=allFrets[(seg-1)/2];
      const toFret=allFrets[(seg+1)/2];
      // Anchor the frequency flat at the moment the slide begins, so the
      // preceding hold segment does NOT get absorbed into the ramp's time span.
      sched.push({t:t,f:m2f(baseMidi+fromFret),gl:false});
      sched.push({t:t+segSec,f:m2f(baseMidi+toFret),gl:true});
    }
    t+=segSec;
  }
  makeBassSeamless(ctx,t0,totalDurSec,sched,!!note.vib);
}

// Metronome click: short percussive blip. Strong (bar downbeat) is higher-pitched
// and louder; weak (other beats) is lower and quieter. Routed through its own
// gain node (metroGain) so volume is independent from note playback volume.
function playClick(strong,startTime){
  const ctx=initAudio();const t=startTime??ctx.currentTime;
  const f=strong?1600:1000;
  const osc=ctx.createOscillator();osc.type='sine';osc.frequency.value=f;
  const g=ctx.createGain();
  const peak=strong?1.0:0.55;
  g.gain.setValueAtTime(peak,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.045);
  osc.connect(g);g.connect(metroGain);
  osc.start(t);osc.stop(t+0.05);
}

function playGhost(om,startTime){
  const ctx=initAudio();const mg=getM();const t=startTime??ctx.currentTime;
  const f=m2f(om||28),tf=Math.min(f*.8,120);
  const th=ctx.createOscillator();th.type='sine';th.frequency.value=tf;
  const thG=ctx.createGain();thG.gain.setValueAtTime(2.6,t);thG.gain.exponentialRampToValueAtTime(.001,t+.09);
  th.connect(thG);thG.connect(mg);
  const at=ctx.createOscillator();at.type='triangle';at.frequency.value=f*1.2;
  const aG=ctx.createGain();aG.gain.setValueAtTime(1.2,t);aG.gain.exponentialRampToValueAtTime(.001,t+.05);
  at.connect(aG);aG.connect(mg);
  const bz=Math.floor(ctx.sampleRate*.12);const buf=ctx.createBuffer(1,bz,ctx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<bz;i++)d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;
  const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=f*1.2;bp.Q.value=.8;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=Math.min(f*3,2000);
  const nG=ctx.createGain();nG.gain.setValueAtTime(1.8,t);nG.gain.exponentialRampToValueAtTime(.001,t+.12);
  src.connect(bp);bp.connect(lp);lp.connect(nG);nG.connect(mg);
  th.start(t);th.stop(t+.1);at.start(t);at.stop(t+.06);src.start(t);src.stop(t+.13);
}

// ── Note utility ───────────────────────────────────────────────────
function nOwner(si,step){for(let s=Math.max(0,step-72);s<=step;s++){const n=notes[nk(si,s)];if(n&&s+Math.ceil(dispS(n))>step)return s;}return null;}

// ── Export/Import ──────────────────────────────────────────────────
function packNote(n){
  const o={};
  if(n.fret!=null)o.f=n.fret;o.d=n.d;
  if(n.ghost)o.g=1;if(n.dot)o.do=1;if(n.stac)o.st=1;if(n.vib)o.v=1;o.si=n.si;
  if(n.fine)o.fn=1;if(n.trip)o.tr=1;
  if(n.slide)o.sl={t:n.slide.targets,d:n.slide.durations};
  return o;
}
function unpackNote(o){
  return{fret:o.f??null,d:o.d||DDUR,ghost:!!o.g,dot:!!o.do,stac:!!o.st,vib:!!o.v,si:o.si||0,
    fine:!!o.fn,trip:!!o.tr,
    slide:o.sl?{targets:o.sl.t,durations:o.sl.d}:null};
}
function expData(){
  const ns={};Object.entries(notes).forEach(([k,v])=>ns[k]=packNote(v));
  // v14: internal resolution is 48 divisions/bar. Volume is a local preference — not saved.
  return btoa(unescape(encodeURIComponent(JSON.stringify({v:14,ts:tSig,tp:tempo,ns:nStr,b:bars,n:ns}))));
}
function impData(code){
  const j=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  if(!j||!j.v)throw new Error('invalid');
  tSig=j.ts||4;tempo=j.tp||80;nStr=j.ns||4;bars=j.b||1;
  document.getElementById('timeSig').value=tSig;document.getElementById('stringSel').value=nStr;
  setTempo(tempo); // j.vl (volume) from older saved codes is intentionally ignored
  // Migration: data at v<=13 used 16 divisions/bar. Scale step positions and
  // durations by TPS(=3) to convert into the 48-division system used from v14.
  const legacy=(j.v<=13);
  notes={};
  if(j.n)Object.entries(j.n).forEach(([k,v])=>{
    const note=unpackNote(v);
    let key=k;
    if(legacy){
      // Positions and note durations scale by TPS (16-grid -> 48-grid).
      note.d=note.d*TPS;
      const [si,st]=k.split(':');
      key=si+':'+(parseInt(st)*TPS);
      // Slide sub-step durations used a different old unit (32nds), so scaling
      // by TPS would overshoot. Re-normalize to the note's new total instead;
      // this keeps the slide valid (invariant holds) with proportions preserved
      // as closely as integer steps allow.
      if(note.slide){
        const norm=slNormalize({targets:note.slide.targets,durations:note.slide.durations},gmxFor(note));
        note.slide={targets:norm.targets,durations:norm.durations};
      }
    }
    notes[key]=note;
  });
  stopPlay();ppos=0;buildCanvas();renderSvg();updatePbar();
}
document.getElementById('exportBtn').addEventListener('click',()=>{document.getElementById('ioTa').value=expData();showMsg('エクスポートしました',false);});

// Always redirect back to a clean URL (no leftover query/hash from a
// previous OAuth round-trip). Using window.location.href directly can
// carry stale auth params/fragments into the next login attempt and
// cause it to silently fail.
function cleanAppUrl(){return window.location.origin+window.location.pathname;}

async function refreshAuthUI(){
  const{data:{session}}=await sbClient.auth.getSession();
  const statusEl=document.getElementById('acctStatus');
  const loginBtn=document.getElementById('loginBtn');
  const logoutBtn=document.getElementById('logoutBtn');
  const hint=document.getElementById('cloudHint');
  const loggedInArea=document.getElementById('cloudLoggedInArea');
  if(session&&session.user){
    const email=session.user.email||'ログイン中';
    statusEl.textContent=email;
    loginBtn.style.display='none';
    logoutBtn.style.display='';
    hint.style.display='none';
    loggedInArea.style.display='block';
    loadMyTabs();
  } else {
    statusEl.textContent='未ログイン';
    loginBtn.style.display='';
    logoutBtn.style.display='none';
    hint.style.display='';
    loggedInArea.style.display='none';
  }
}

// Check whether the given user already has a tab saved under this exact title.
async function isTitleTaken(userId,title,excludeId){
  let q=sbClient.from('tabs').select('id').eq('user_id',userId).eq('title',title);
  if(excludeId)q=q.neq('id',excludeId);
  const{data,error}=await q;
  if(error)return false; // fail-open: don't block saving just because the check itself failed
  return data&&data.length>0;
}
// Find a title that isn't taken yet, appending "(2)", "(3)", ... as needed.
async function uniqueTitle(userId,baseTitle){
  let candidate=baseTitle,n=2;
  while(await isTitleTaken(userId,candidate)){candidate=`${baseTitle}(${n})`;n++;}
  return candidate;
}

    overB.addEventListener('click',async()=>{
      if(!confirm(`「${row.title}」を、今開いている内容で上書き保存します。よろしいですか？`))return;
      const code=expData();
      const{error}=await sbClient.from('tabs').update({code,updated_at:new Date().toISOString()}).eq('id',row.id);
      if(error)cloudMsg('上書き保存に失敗しました',true);else{cloudMsg('上書き保存しました',false);loadMyTabs();}
    });
    const dupB=document.createElement('button');dupB.className='btn sm';dupB.textContent='複製';
    dupB.addEventListener('click',async()=>{
      const baseTitle=row.title+' のコピー';
      const finalTitle=await uniqueTitle(session.user.id,baseTitle);
      const{error}=await sbClient.from('tabs').insert({user_id:session.user.id,title:finalTitle,code:row.code});
      if(error)cloudMsg('複製に失敗しました',true);else{cloudMsg('複製しました',false);loadMyTabs();}
    });
    const copyB=document.createElement('button');copyB.className='btn sm';copyB.textContent='コードをコピー';
    copyB.addEventListener('click',()=>{
      navigator.clipboard.writeText(row.code).then(()=>cloudMsg('コードをコピーしました',false)).catch(()=>cloudMsg('コピーに失敗しました',true));

      if(error)cloudMsg('削除に失敗しました',true);else{cloudMsg('削除しました',false);loadMyTabs();}

    acts.appendChild(openB);acts.appendChild(overB);acts.appendChild(dupB);acts.appendChild(copyB);acts.appendChild(delB);

let activePop=null;

function openPop(si,step,mx,my){
  closePop();
  const strs=gStr();const ex=notes[nk(si,step)];
  const pop=document.createElement('div');pop.className='pop';

  // Title row
  const tr=document.createElement('div');tr.className='pop-tr';
  const te=document.createElement('div');te.className='pop-title';te.textContent=`${strs[si].n}弦 / step ${step+1}`;
  const cb=document.createElement('div');cb.className='pop-cbs';
  const cpB=document.createElement('button');cpB.className='btn sm';cpB.textContent='📋';cpB.title='コピー';
  const ptB=document.createElement('button');ptB.className='btn sm';ptB.textContent='📌';ptB.title='ペースト';
  ptB.style.opacity=clip?'1':'.4';ptB.disabled=!clip;
  cb.appendChild(cpB);cb.appendChild(ptB);tr.appendChild(te);tr.appendChild(cb);pop.appendChild(tr);

  // Two-column layout
  const inner=document.createElement('div');inner.className='pop-inner';
  const pLeft=document.createElement('div');pLeft.className='pop-left';
  const pRight=document.createElement('div');pRight.className='pop-right';
  inner.appendChild(pLeft);inner.appendChild(pRight);pop.appendChild(inner);

  let isDot=!!(ex?.dot),isStac=!!(ex?.stac);
  // fineMode starts from the note's stored fine flag (so the user's choice
  // persists across reopen). refreshFineUI() will force it ON when the current
  // length/position strictly requires fine mode, but never auto-switches it OFF.
  let isTrip=false;
  let fineMode=!!(ex?.fine);
  let tech=ex?(ex.ghost?'ghost':ex.slide?'slide':ex.vib?'vib':'none'):'none';
  // Working copy of slide state (deep copy)
  let slideState=ex?.slide?{targets:ex.slide.targets.slice(),durations:ex.slide.durations.slice()}:null;

  // ── Left column ──
  const fF=document.createElement('div');fF.className='pop-field';
  const fL=document.createElement('label');fL.textContent='フレット（0〜24）';
  const fI=document.createElement('input');fI.type='number';fI.min=0;fI.max=24;
  fI.value=(ex&&!ex.ghost)?ex.fret:'';fI.placeholder='0';
  fI.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
  fF.appendChild(fL);fF.appendChild(fI);pLeft.appendChild(fF);

  const dF=document.createElement('div');dF.className='pop-field';
  const dLbl=document.createElement('label');dLbl.textContent='音の長さ';
  const dS=document.createElement('select');
  const curDurVal=ex?Number(ex.d):DDUR;
  const isStdDur=DURS.some(d=>d.v===curDurVal);
  DURS.forEach(d=>{const o=document.createElement('option');o.value=String(d.v);o.textContent=d.l;if(isStdDur&&curDurVal===d.v)o.selected=true;dS.appendChild(o);});
  const customOpt=document.createElement('option');customOpt.value='custom';customOpt.textContent='長さを入力する';
  if(!isStdDur)customOpt.selected=true;
  dS.appendChild(customOpt);
  dF.appendChild(dLbl);dF.appendChild(dS);
  // Custom duration number input (shown only when "custom" selected)
  const dCustomWrap=document.createElement('div');dCustomWrap.style.cssText='margin-top:5px;display:'+(!isStdDur?'block':'none');
  const dCustomLbl=document.createElement('label');dCustomLbl.style.cssText='font-size:10px;color:var(--text3);display:block;margin-bottom:2px';dCustomLbl.textContent='長さ（48分割ステップ数 / 4分音符=12）';
  const dCustomInp=document.createElement('input');dCustomInp.type='number';dCustomInp.min=1;dCustomInp.style.cssText='width:70px;font-size:13px;padding:3px 6px;';
  dCustomInp.value=String(curDurVal);
  dCustomInp.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
  dCustomWrap.appendChild(dCustomLbl);dCustomWrap.appendChild(dCustomInp);
  dF.appendChild(dCustomWrap);
  // Fine-mode toggle + triplet-ize button
  const fineRow=document.createElement('div');fineRow.style.cssText='margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:wrap';
  const fineBtn=document.createElement('button');fineBtn.className='btn sm';fineBtn.type='button';
  const tripBtn=document.createElement('button');tripBtn.className='btn sm';tripBtn.type='button';tripBtn.textContent='3連符化';
  fineRow.appendChild(fineBtn);fineRow.appendChild(tripBtn);
  dF.appendChild(fineRow);
  pLeft.appendChild(dF);

  const TRIP_MAP={6:2,12:4,24:8,48:16};
  // Whether the current length can be represented on the 16-division grid
  // (a multiple of TPS=3 steps) and is not itself a triplet length.
  // OFF (coarse) is allowed only when the note fits the 16-division grid in all
  // three senses: its length is a triplet length? no; length is a multiple of
  // TPS(=3)? yes; AND its start position sits on a 16-division boundary (step%3===0).
  function canBeCoarse(){const d=getCurDurVal();return d%TPS===0&&!isTripDur(d)&&(step%TPS===0);}
  function refreshFineUI(){
    // Fine is forced ON whenever the current length can't live on the 16-division
    // grid (triplet lengths, or any non-multiple-of-3). Otherwise the user is free
    // to toggle. So OFF is only *available* when canBeCoarse() is true.
    if(!canBeCoarse())fineMode=true;
    fineBtn.textContent=fineMode?'細かい長さ設定: ON':'細かい長さ設定: OFF';
    fineBtn.classList.toggle('on-loop',fineMode);
    const cur=getCurDurVal();
    const canTrip=(TRIP_MAP[cur]!=null&&!isTripDur(cur));
    tripBtn.disabled=!canTrip;tripBtn.style.opacity=canTrip?'1':'.4';
    // The fine button is only lockable (disabled) when OFF isn't allowed AND it's ON.
    const lockOn=!canBeCoarse();
    fineBtn.disabled=lockOn;fineBtn.style.opacity=lockOn?'.6':'1';
    fineBtn.title=lockOn?'この長さ（三連符や16分割に乗らない長さ）では細かい設定が必要です':'';
  }
  fineBtn.addEventListener('click',()=>{
    if(!canBeCoarse())return; // can't turn OFF while the length requires fine
    fineMode=!fineMode;refreshFineUI();
  });
  tripBtn.addEventListener('click',()=>{
    const cur=getCurDurVal();const sub=TRIP_MAP[cur];
    if(sub==null||isTripDur(cur))return;
    const fret=parseInt(fI.value);const f=isNaN(fret)?0:fret;
    for(let k=1;k<3;k++){const o=nOwner(si,step+k*sub);if(o!==null&&o!==step){alert('3連符化するスペースがありません');return;}}
    for(let k=0;k<3;k++){
      notes[nk(si,step+k*sub)]={fret:f,d:sub,ghost:tech==='ghost',dot:false,stac:isStac,vib:tech==='vib',si,slide:null,fine:true,trip:true};
    }
    ensureB(step+cur);
    closePop();buildCanvas();renderSvg();
  });


  // Unified getter for the current duration value (number, always >=1)
  function getCurDurVal(){
    if(dS.value==='custom'){
      return Math.max(1,parseInt(dCustomInp.value)||1);
    }
    return Number(dS.value)||DDUR;
  }
  // If custom input value matches a standard option, auto-switch select to it
  function syncCustomToStandard(){
    const v=Math.max(1,parseInt(dCustomInp.value)||1);
    dCustomInp.value=String(v);
    const match=DURS.find(d=>d.v===v);
    if(match){
      dS.value=String(match.v);
      dCustomWrap.style.display='none';
    }
    refreshFineUI();
    renderSlideUI();
  }
  dS.addEventListener('change',()=>{
    dCustomWrap.style.display=(dS.value==='custom')?'block':'none';
    if(dS.value==='custom')dCustomInp.focus();
    refreshFineUI();
    renderSlideUI();
  });
  dCustomInp.addEventListener('change',syncCustomToStandard);
  dCustomInp.addEventListener('blur',syncCustomToStandard);
  refreshFineUI();

  const aS=document.createElement('div');aS.className='mod-sec';
  const aL=document.createElement('div');aL.className='mod-sec-lbl';aL.textContent='アーティキュレーション';
  const aR=document.createElement('div');aR.className='mod-row';
  const dB=mkB('♩.','符点');const sB=mkB('·','スタッカート');
  aR.appendChild(dB);aR.appendChild(sB);aS.appendChild(aL);aS.appendChild(aR);pLeft.appendChild(aS);

  const tS=document.createElement('div');tS.className='mod-sec';
  const tL=document.createElement('div');tL.className='mod-sec-lbl';tL.textContent='奏法（いずれか一つ）';
  const tR=document.createElement('div');tR.className='mod-row';
  const gB=mkB('×','ゴースト');const slB=mkB('/\\','スライド');const vB=mkB('~','ビブラート');
  tR.appendChild(gB);tR.appendChild(slB);tR.appendChild(vB);tS.appendChild(tL);tS.appendChild(tR);pLeft.appendChild(tS);
  function mkB(icon,label){const e=document.createElement('button');e.className='mod-btn off';e.innerHTML=`<span class="mi">${icon}</span><span class="ml">${label}</span>`;return e;}

  // ── Right column: slide settings ──
  const rTitle=document.createElement('div');rTitle.className='pop-right-title';rTitle.textContent='スライド設定';pRight.appendChild(rTitle);
  const destListEl=document.createElement('div');destListEl.className='slide-dest-list';pRight.appendChild(destListEl);
  const addRow=document.createElement('div');addRow.className='sdest-add-row';pRight.appendChild(addRow);
  const zonePanel=document.createElement('div');zonePanel.className='zone-panel';zonePanel.style.marginTop='8px';
  const zonePanelTitle=document.createElement('div');zonePanelTitle.className='zone-panel-title';zonePanel.appendChild(zonePanelTitle);
  const zonePanelRows=document.createElement('div');zonePanel.appendChild(zonePanelRows);
  const zoneDiag=document.createElement('div');zoneDiag.className='zone-diagram';zonePanel.appendChild(zoneDiag);
  pRight.appendChild(zonePanel);

  function safeF(f){return(f!=null&&!isNaN(f)&&f>=0&&f<=24)?String(f):'?';}
  function curTotalSteps(){return gmxFor({d:getCurDurVal(),dot:isDot,stac:isStac});}

  // Ensure slideState exists & is normalized to current totalSteps
  function ensureSlideState(){
    const total=curTotalSteps();
    if(!slideState){
      const baseFret=parseInt(fI.value);
      slideState=slCreate(isNaN(baseFret)?0:0,total); // placeholder target; will be set via UI (null fret allowed visually)
      // We actually want target fret to start as null (unset) in UI but core needs a number.
      // Use 0 as internal placeholder; UI shows blank until user types, then we update via setTargetFret.
      slideState.targets=[null];
    } else {
      // re-normalize to current total (in case duration changed)
      const safeTargets=slideState.targets.map(t=>t==null?0:t);
      const norm=slNormalize({targets:safeTargets,durations:slideState.durations},total);
      slideState={targets:slideState.targets.slice(),durations:norm.durations}; // keep null markers, only durations updated
    }
  }

  function setTargetFret(i,val){
    slideState.targets[i]=val;
  }

  function renderSlideUI(){
    if(tech!=='slide'){pRight.classList.remove('vis');return;}
    pRight.classList.add('vis');
    ensureSlideState();
    const total=curTotalSteps();
    const baseFret=parseInt(fI.value);
    const allFretsDisplay=[isNaN(baseFret)?null:baseFret,...slideState.targets];

    // Destination list
    destListEl.innerHTML='';
    slideState.targets.forEach((tgt,i)=>{
      const row=document.createElement('div');row.className='sdest-row';
      const lbl=document.createElement('div');lbl.className='sdest-lbl';lbl.textContent=`→ ${i+1}:`;
      const inp=document.createElement('input');inp.type='number';inp.className='sdest-inp';inp.min=0;inp.max=24;
      if(tgt!=null)inp.value=String(tgt);
      inp.placeholder='0〜24';
      inp.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
      function commit(){
        const v=parseInt(inp.value);
        setTargetFret(i,(isNaN(v)||v<0||v>24)?null:v);
        renderSlideUI(); // refresh labels (zone panel) without losing other state
      }
      inp.addEventListener('change',commit);
      inp.addEventListener('blur',commit);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();}); // commit before bubbling to global confirm
      const rmB=document.createElement('div');rmB.className='sdest-rm';rmB.textContent='×';rmB.title='削除';
      rmB.addEventListener('click',()=>{
        const r=slRemoveTarget({targets:slideState.targets.map(t=>t==null?0:t),durations:slideState.durations},i,total);
        if(r.slide===null){ slideState=null; tech='none'; refAll(); return; }
        // Preserve null markers for targets that are still null after removal (shift indices)
        const newTargets=slideState.targets.slice();newTargets.splice(i,1);
        slideState={targets:newTargets,durations:r.slide.durations};
        renderSlideUI();
      });
      row.appendChild(lbl);row.appendChild(inp);row.appendChild(rmB);
      destListEl.appendChild(row);
    });

    // Add button — only enabled if last target has a valid fret (or list empty... but list never empty in 'slide' tech)
    addRow.innerHTML='';
    const lastT=slideState.targets[slideState.targets.length-1];
    const canAdd=(lastT!=null);
    const addB=document.createElement('button');addB.className='btn sm';addB.textContent='＋ スライド先を追加';
    addB.disabled=!canAdd;addB.style.opacity=canAdd?'1':'.4';
    addB.addEventListener('click',()=>{
      if(!canAdd)return;
      const safeTargets=slideState.targets.map(t=>t==null?0:t);
      const r=slAddTarget({targets:safeTargets,durations:slideState.durations},0,total);
      slideState={targets:[...slideState.targets,null],durations:r.slide.durations};
      renderSlideUI();
    });
    addRow.appendChild(addB);

    // Zone panel: one row per duration slot
    const n=slideState.targets.length;
    zonePanelTitle.textContent=`区間設定（32分音符 合計${total}個）`;
    zonePanelRows.innerHTML='';
    const safeTargets=slideState.targets.map(t=>t==null?0:t);
    const allF=[isNaN(baseFret)?0:baseFret,...safeTargets];
    slideState.durations.forEach((val,idx)=>{
      const isSlide=slIsSlideIdx(idx);
      let label;
      if(isSlide){
        const fromF=allFretsDisplay[(idx-1)/2],toF=allFretsDisplay[(idx+1)/2];
        const fromS=safeF(fromF),toS=safeF(toF);
        const arrow=(fromF!=null&&toF!=null&&toF<fromF)?'\\':'/';
        label=`${fromS}${arrow}${toS} のスライド長さ`;
      } else {
        const fr=allFretsDisplay[idx/2];
        label=`${safeF(fr)} の長さ`;
      }
      const row=document.createElement('div');row.className='zone-row';
      row.style.cssText='display:flex;align-items:center;gap:3px;margin-bottom:3px;min-width:0;';
      const lb=document.createElement('div');
      lb.style.cssText='font-size:10px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:2px;';
      lb.textContent=label;row.appendChild(lb);

      const mB=document.createElement('button');mB.className='step-btn';mB.style.flexShrink='0';mB.textContent='−';
      const inp=document.createElement('input');inp.type='number';inp.className='zone-num-inp';inp.min=isSlide?1:0;inp.style.cssText='width:28px;flex-shrink:0;';inp.value=val;
      inp.addEventListener('wheel',e=>e.preventDefault(),{passive:false});
      const pB=document.createElement('button');pB.className='step-btn';pB.style.flexShrink='0';pB.textContent='＋';
      const un=document.createElement('div');un.style.cssText='font-size:9px;color:var(--text3);flex-shrink:0;white-space:nowrap;';un.textContent='個';

      function doSet(raw){

function ensureB(n){while(bars*SPB<n)bars++;}
function resizeN(si,step,delta){
  const note=notes[nk(si,step)];if(!note)return;
  // A note is in fine mode if it was flagged fine, or its length/position can't
  // live on the 16-division grid (triplet length, non-mult-of-3, or off-grid start).
  const needsFine=note.fine||isTripDur(note.d)||(note.d%TPS!==0)||(step%TPS!==0);
  //  - coarse: move by a 16th note (TPS=3 steps), minimum length = 16th (3)
  //  - fine:   move by 1 step, minimum length = half-beat triplet (2)
  const gran=needsFine?1:TPS;
  const minLen=needsFine?2:TPS;
  const nd=Math.max(minLen,note.d+delta*gran);
  const en=note.dot?nd*1.5:nd;
  for(let s=step+1;s<step+Math.ceil(en);s++){const o=nOwner(si,s);if(o!==null&&o!==step)return;}
  note.d=nd;
  if(note.slide){
    const newTotal=gmxFor(note);
    const norm=slNormalize({targets:note.slide.targets,durations:note.slide.durations},newTotal);
    note.slide={targets:norm.targets,durations:norm.durations};
  }
  ensureB(step+Math.ceil(dispS(note)));buildCanvas();renderSvg();
}
// ── Transport / Playbar ────────────────────────────────────────────
// Lightweight per-step update: only moves the fill/head/label. Called every
// scheduler step, so it must stay cheap (no SVG rebuild).
function updatePbar(){
  const ts=tSteps();
  const fill=document.getElementById('pbarFill');
  const head=document.getElementById('pbarHead');
  const lbl=document.getElementById('pbarLabel');
  if(!fill||!head)return;
  const pct=ts>0?ppos/ts:0;
  fill.style.width=(pct*100)+'%';
  head.style.left=(pct*100)+'%';
  lbl.textContent=`小節 ${Math.floor(ppos/SPB)+1} · 拍 ${Math.floor((ppos%SPB)/(SPB/tSig))+1}`;
}
// Heavier: rebuilds the beat/bar tick marks and loop region. Only needs to run
// when the structure changes (bars added/removed, tSig, loop) — NOT every step.
function updatePbarMarks(){
  const ts=tSteps();
  const svgEl=document.getElementById('pbarMarks');
  const wrap=document.getElementById('pbarWrap');
  if(!svgEl||!wrap)return;
  const W=wrap.offsetWidth||300;
  let h='';
  for(let s=0;s<ts;s+=SPB/tSig){ // step by one beat (12 steps) instead of every step
    const x=(s/ts)*W;
    if(s%SPB===0)h+=`<line x1="${x}" y1="0" x2="${x}" y2="28" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>`;
    else h+=`<line x1="${x}" y1="7" x2="${x}" y2="21" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
  }
  if(loopOn){
    const ls=(loopSBar!=null?loopSBar-1:0);const le=(loopEBar!=null?loopEBar:bars);
    const lx1=(ls*SPB/ts)*W,lx2=(le*SPB/ts)*W;
    h+=`<rect x="${lx1}" y="0" width="${lx2-lx1}" height="28" fill="rgba(26,158,106,.12)"/>`;
    h+=`<line x1="${lx1}" y1="0" x2="${lx1}" y2="28" stroke="#1a9e6a" stroke-width="1.5"/>`;
    h+=`<line x1="${lx2}" y1="0" x2="${lx2}" y2="28" stroke="#1a9e6a" stroke-width="1.5"/>`;
  }
  svgEl.setAttribute('viewBox',`0 0 ${W} 28`);svgEl.innerHTML=h;
}

  }

  function endScrub(){
    if(!scrubbing)return;scrubbing=false;wrap.style.cursor='pointer';
    if(wasPlaying)resumeFrom(ppos);else{document.getElementById('statusTxt').textContent='一時停止中 (小節 '+(Math.floor(ppos/SPB)+1)+')';}

// ── Lookahead scheduler (drift-free) ────────────────────────────────
// Naive recursive setTimeout chains drift slower than the real tempo because
// each call's JS execution time (audio scheduling + DOM updates) gets added
// on top of the requested delay, and that error accumulates over time.
// Instead we anchor playback to the AudioContext's own sample-accurate clock
// (ctx.currentTime) and schedule notes ahead of time; a lightweight timer
// merely polls whether it's time to push more notes into the lookahead window.
const SCHED_AHEAD_SEC=0.12; // how far ahead of "now" we schedule audio
const SCHED_POLL_MS=25;     // how often the scheduler polls
let nextStepTime=0,schedStep=0;

function resumeFrom(pos){
  ppos=pos;schedStep=pos;initAudio();actx.resume().then(()=>{
    playing=true;ptempo=effTempo();
    // Reset visual-clock anchor; scheduler() will set pst/psp from the first
    // step's precise audio time, then animPH derives the playhead from there.
    schedAnchored=false;psp=-1;animLastStep=-1;phLastScrollLine=-1;
    document.getElementById('playBtn').textContent='⏸ 一時停止';
    document.getElementById('sdot').classList.add('playing');
    document.getElementById('statusTxt').textContent='再生中...';
    nextStepTime=actx.currentTime+0.05;
    scheduler();
    animPH();
  });
}
function scheduler(){
  if(!playing)return;
  while(nextStepTime<actx.currentTime+SCHED_AHEAD_SEC){
    const playingStep=schedStep;
    const fireAt=nextStepTime;
    playStep(playingStep,fireAt);
    if(metroOn&&playingStep%metroDur===0){
      playClick(playingStep%SPB===0,fireAt); // strong on bar downbeat, weak otherwise
    }
    // Anchor the visual clock to the first scheduled step so animPH can derive
    // the current play position from AudioContext time (no per-step setTimeout).
    if(!schedAnchored){pst=performance.now()+(fireAt-actx.currentTime)*1000;psp=playingStep;ptempo=effTempo();schedAnchored=true;}
    const stepDurSec=(60/effTempo())*(1/12); // one 48-division step, scaled by tempo AND playback speed
    nextStepTime+=stepDurSec;
    let next=playingStep+1;
    if(loopOn){
      const ts=tSteps();
      const ls=(loopSBar!=null?Math.max(0,(loopSBar-1)*SPB):0);
      const le=(loopEBar!=null?Math.min(ts,loopEBar*SPB):ts);
      if(next>=le){next=ls;schedAnchored=false;animLastStep=-1;} // wrap: re-anchor visual clock
    } else {
      if(next>=tSteps()){next=0;schedAnchored=false;animLastStep=-1;}
    }
    schedStep=next;
  }
  ptimer=setTimeout(scheduler,SCHED_POLL_MS);
}

function startPlay(fromStart){
  if(playing){
    playing=false;clearTimeout(ptimer);cancelAnimationFrame(afId);
    silenceNow();
    document.getElementById('playBtn').textContent='▶ 再生';
    document.getElementById('sdot').classList.remove('playing');
    document.getElementById('statusTxt').textContent='一時停止中 (小節 '+(Math.floor(ppos/SPB)+1)+')';
    return;
  }
  if(fromStart){ppos=loopOn&&loopSBar!=null?(loopSBar-1)*SPB:0;}
  // If loop on, ensure ppos is within loop range
  if(loopOn){
    const ts=tSteps();
    const ls=(loopSBar!=null?(loopSBar-1)*SPB:0);
    const le=(loopEBar!=null?Math.min(ts,loopEBar*SPB):ts);
    if(ppos<ls||ppos>=le)ppos=ls;
  }
  resumeFrom(ppos);
}
function stopPlay(){
  playing=false;clearTimeout(ptimer);hidePH();
  silenceNow();
  document.getElementById('playBtn').textContent='▶ 再生';
  document.getElementById('sdot').classList.remove('playing');
  document.getElementById('statusTxt').textContent='停止中';
  hlStep(-1);updatePbar();
}
function skipBars(delta){
  const wasP=playing;
  if(playing){playing=false;clearTimeout(ptimer);cancelAnimationFrame(afId);silenceNow();}
  const newBar=Math.max(0,Math.min(bars-1,Math.floor(ppos/SPB)+delta));
  ppos=newBar*SPB;hlStep(ppos);updatePbar();
  if(wasP)resumeFrom(ppos);
  else document.getElementById('statusTxt').textContent='一時停止中 (小節 '+(newBar+1)+')';
}

function clampLoopInputs(){
  const lsEl=document.getElementById('loopStart');const leEl=document.getElementById('loopEnd');
  if(lsEl.value!==''){const v=Math.max(1,Math.min(bars,parseInt(lsEl.value)||1));lsEl.value=v;loopSBar=v;}else loopSBar=null;
  if(leEl.value!==''){const v=Math.max(1,Math.min(bars,parseInt(leEl.value)||bars));leEl.value=v;loopEBar=v;}else loopEBar=null;
  updatePbar();updatePbarMarks();
  // If loop is on and currently playing outside the new range, jump to loop start immediately
  if(loopOn&&playing){
    const ts=tSteps();
    const ls=(loopSBar!=null?(loopSBar-1)*SPB:0);
    const le=(loopEBar!=null?Math.min(ts,loopEBar*SPB):ts);
    if(ppos<ls||ppos>=le){
      playing=false;clearTimeout(ptimer);cancelAnimationFrame(afId);
      silenceNow();
      resumeFrom(ls);
    }
  } else if(loopOn&&!playing){
    // Paused: update ppos to loop start so next play starts there
    const ts=tSteps();
    const ls=(loopSBar!=null?(loopSBar-1)*SPB:0);
    const le=(loopEBar!=null?Math.min(ts,loopEBar*SPB):ts);
    if(ppos<ls||ppos>=le){
      ppos=ls;hlStep(ppos);updatePbar();
    }
  }
}
